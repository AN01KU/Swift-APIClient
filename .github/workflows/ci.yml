name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: swift-format lint ./Sources ./Tests --recursive

  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Test
        run: swift test
