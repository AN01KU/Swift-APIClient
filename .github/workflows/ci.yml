name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Check formatting
        run: xcrun swift-format lint --recursive ./Sources ./Tests

  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Test
        run: |
          swift test --enable-code-coverage \
            2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Summarise test results
        if: always()
        run: |
          echo "## Test Results (macOS)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "(Suite \".*\" (passed|failed)|Test run with [0-9]+ tests)" test-output.txt \
            >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-macos
          path: test-output.txt
          retention-days: 14

