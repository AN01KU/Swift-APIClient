name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Package source archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          git archive --format=zip --prefix="APIClient-${VERSION}/" \
            HEAD -- Sources Tests Package.swift README.md LICENSE \
            > "APIClient-${VERSION}.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release create "${VERSION}" \
            --title "APIClient ${VERSION}" \
            --generate-notes \
            --verify-tag \
            "APIClient-${VERSION}.zip#Source archive (Sources + Tests)"
